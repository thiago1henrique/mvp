<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bell" cx="42%" cy="18%" r="65%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#cffafe"/>
      <stop offset="50%"  stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0e7490" stop-opacity="0.85"/>
    </radialGradient>
  </defs>

  <!-- Dark background pill -->
  <rect width="32" height="32" rx="7" fill="#07070f"/>

  <!-- Bell dome -->
  <path d="M4 17 Q4 5 16 5 Q28 5 28 17
           Q25 14.5 21.5 16 Q19 17 16 16
           Q13 15 10.5 16 Q7 14.5 4 17 Z"
        fill="url(#bell)"/>

  <!-- Rim shimmer -->
  <path d="M4 17 Q7 15 10.5 16 Q13 17 16 16 Q19 15 21.5 16 Q25 17 28 17"
        fill="none" stroke="#a5f3fc" stroke-width="0.75" opacity="0.75"/>

  <!-- Tentacles (5) -->
  <path d="M8   17 Q6.5  21 8   25 Q9   28 8   30" fill="none" stroke="#67e8f9" stroke-width="1"   stroke-linecap="round" opacity="0.85"/>
  <path d="M11.5 17 Q10.5 20 11.5 23.5 Q12.5 27 11.5 29" fill="none" stroke="#a5f3fc" stroke-width="0.85" stroke-linecap="round" opacity="0.7"/>
  <path d="M16  17 Q16   21 16  25 Q16  28 16  30"  fill="none" stroke="#67e8f9" stroke-width="1"   stroke-linecap="round" opacity="0.85"/>
  <path d="M20.5 17 Q21.5 20 20.5 23.5 Q19.5 27 20.5 29" fill="none" stroke="#a5f3fc" stroke-width="0.85" stroke-linecap="round" opacity="0.7"/>
  <path d="M24  17 Q25.5 21 24  25 Q23  28 24  30"  fill="none" stroke="#67e8f9" stroke-width="1"   stroke-linecap="round" opacity="0.85"/>

  <!-- Inner highlight (refraction) -->
  <ellipse cx="19.5" cy="9.5" rx="3.2" ry="1.8" fill="#e0f9ff" opacity="0.28" transform="rotate(-15 19.5 9.5)"/>
</svg>
